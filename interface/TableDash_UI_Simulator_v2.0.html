function toyCard(x,y,w,h,toy){
  const owned=!!ownedToys[toy.name];
  const passLocked=(toy.kind==="passCoin"||toy.kind==="premiumTrack")&&!premiumOwned;
  const trackLocked=toy.kind==="freeTrack" && passLevel<3;
  const eventLocked=toy.kind==="event";
  const equippedIndex=equippedToySlots.findIndex(t=>t===toy.name);
  const equipped=equippedIndex===selectedToySlot;
  const equippedElsewhere=equippedIndex!==-1 && equippedIndex!==selectedToySlot;
  const locked=passLocked||trackLocked||eventLocked;
  const canBuy=toy.kind==="coin" && coins>=toy.cost;
  const canPassBuy=toy.kind==="passCoin" && premiumOwned && coins>=toy.cost;
  const canRobux=toy.kind==="robux";

  const stroke=equipped?C.gold2:equippedElsewhere?"#b98cff":locked?"#5e438b":(canBuy||canPassBuy||canRobux||owned)?C.gold2:C.purple2;
  grad(x,y,w,h,12,locked?"#090b17":"#101225","#070916",stroke,equipped?2.0:equippedElsewhere?1.55:1.2,equipped);
  box(x+12,y+14,52,48,10,locked?"#100b1c":"#17112b",locked?"#5e438b":C.purple2,1);
  drawIcon(toy.kind==="robux"?"star":toy.kind==="premiumTrack"?"medal":toy.kind==="event"?"flame":"gift",x+38,y+38,15,locked?C.purple2:C.gold);

  txt(toy.name,x+78,y+22,12,locked?C.muted:C.white,true,"left","middle",w-96);
  txt(toy.source,x+78,y+41,8.5,locked?C.muted2:C.muted,false,"left","middle",w-96);

  let tag=owned?"OWNED":toy.type.toUpperCase();
  if(toy.kind==="passCoin") tag="PURCHASE";
  if(equippedElsewhere) tag=`SLOT ${equippedIndex+1}`;
  smallStatus(x+78,y+58,116,tag,equipped?"ready":locked?"locked":equippedElsewhere?"muted":"muted");

  let label="EQUIP", disabled=false, active=false;
  if(equipped){label="EQUIPPED"; active=false}
  else if(equippedElsewhere){label="UNEQUIP"; active=false}
  else if(owned){label="EQUIP"; active=true}
  else if(toy.kind==="coin"){label=`${toy.cost.toLocaleString()} COINS`; active=coins>=toy.cost; disabled=!active}
  else if(toy.kind==="passCoin"){
    if(!premiumOwned){label="GET PASS"; active=true}
    else {label=`${toy.cost.toLocaleString()} COINS`; active=coins>=toy.cost; disabled=!active}
  }
  else if(toy.kind==="freeTrack"){label=passLevel>=3?"CLAIM":"PASS LVL 3"; active=passLevel>=3; disabled=!active}
  else if(toy.kind==="premiumTrack"){label=premiumOwned?"CLAIM":"GET PASS"; active=true}
  else if(toy.kind==="robux"){label=`R$ ${toy.cost}`; active=true}
  else if(toy.kind==="event"){label="EVENT"; disabled=true}

  const bx=x+w-124, by=y+h-36;
  if(disabled){
    disabledBtn(bx,by,108,26,label,null,true);
  }else{
    btn(bx,by,108,26,label,active,()=>{
      if(equipped){
        equippedToySlots[selectedToySlot]=null;
        syncEquippedToyLabel();
        toast("Toy unequipped from Slot "+(selectedToySlot+1));
        draw();
        return;
      }
      if(equippedElsewhere){
        equippedToySlots[equippedIndex]=null;
        syncEquippedToyLabel();
        toast("Toy unequipped from Slot "+(equippedIndex+1));
        draw();
        return;
      }
      if(owned){
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Toy equipped to Slot "+(selectedToySlot+1));
        draw();
        return;
      }
      if(toy.kind==="coin" && coins>=toy.cost){
        coins-=toy.cost;
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Toy bought and equipped");
        draw();
        return;
      }
      if(toy.kind==="passCoin"){
        if(!premiumOwned){modal="passBuy";draw();return}
        if(coins>=toy.cost){
          coins-=toy.cost;
          ownedToys[toy.name]=true;
          equippedToySlots[selectedToySlot]=toy.name;
          syncEquippedToyLabel();
          toast("Purchase equipped");
          draw();
          return;
        }
      }
      if(toy.kind==="premiumTrack"){
        if(!premiumOwned){modal="passBuy";draw();return}
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Premium reward equipped");
        draw();
        return;
      }
      if(toy.kind==="freeTrack" && passLevel>=3){
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Free-track toy claimed");
        draw();
        return;
      }
      if(toy.kind==="robux"){toast("Robux purchase placeholder");return}
    },null,true);
  }
}

function drawToyBrowserPopup(){
  const m=modalShell(640,500,"TOY CABINET",`Choose a toy for Slot ${selectedToySlot+1}`,"gift");
  txt("Coins, rewards, Robux, and Arcade Pass items. One toy can only fill one slot.",m.x+34,m.y+100,10.5,C.muted,false,"left","middle",560);

  const viewX=m.x+34, viewY=m.y+126, viewW=572, viewH=292;
  box(viewX,viewY,viewW,viewH,12,"#090b17",C.purple2,1);

  ctx.save();
  ctx.beginPath();
  ctx.rect(viewX+8,viewY+8,viewW-16,viewH-16);
  ctx.clip();

  const cardW=532, cardH=86, gapY=14;
  const contentH=toyCatalog.length*(cardH+gapY)-gapY+16;
  const maxScroll=Math.max(0,contentH-(viewH-16));
  toyScroll=Math.max(0,Math.min(maxScroll,toyScroll));

  toyCatalog.forEach((toy,i)=>{
    const x=viewX+18;
    const y=viewY+16+i*(cardH+gapY)-toyScroll;
    if(y+cardH<viewY+8 || y>viewY+viewH-8)return;
    toyCard(x,y,cardW,cardH,toy);
  });

  ctx.restore();

  if(maxScroll>0){
    const barX=viewX+viewW-12, barY=viewY+14, barH=viewH-28;
    box(barX,barY,4,barH,3,"#1b1130",null,0);
    const thumbH=Math.max(34,barH*(barH/(contentH+18)));
    const thumbY=barY+(barH-thumbH)*(toyScroll/maxScroll);
    box(barX-1,thumbY,6,thumbH,3,C.gold,null,0);
  }

  btn(m.x+34,m.y+434,150,34,"TOY SLOTS",false,()=>{modal="toys";draw()},null,true);
  btn(m.x+204,m.y+434,150,34,"OPEN PASS",false,()=>{modal=null;page="pass";draw()},null,true);
  btn(m.x+374,m.y+434,150,34,"CLOSE",false,()=>{modal=null;draw()},null,true);
}
function drawModal(){if(!modal)return;if(modal==="join"){drawJoinModal();return}if(modal==="results"){drawResults();return}if(modal==="hostGame"){drawHostSettingsPopup();return}drawSimpleModal()}
function drawToast(){if(!toastText||performance.now()>toastUntil)return;grad(455,585,340,34,9,"#0d1022","#070916",C.purple2,1.3,true);txt(toastText,625,602,12,C.white,true);requestAnimationFrame(draw)}
function toast(s){toastText=s;toastUntil=performance.now()+1800;draw()}
function draw(){hitboxes=[];ref(()=>{background();topBar();if(page==="play")drawPlay();else if(page==="rewards")drawRewards();else if(page==="pass")drawPass();else if(page==="mytable")drawMyTable();else txt("No page open",625,310,28,C.muted,true);bottomNav();drawModal();drawToast()})}
canvas.addEventListener("mousedown",e=>{let p=toRef(e.clientX,e.clientY);for(let i=hitboxes.length-1;i>=0;i--){let h=hitboxes[i];if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h){h.fn();return}}if(searchFocused){searchFocused=false;draw()}});
canvas.addEventListener("wheel",e=>{
  if(modal==="toyBrowser"){
    e.preventDefault();
    toyScroll=Math.max(0,toyScroll+e.deltaY);
    draw();
  }
},{passive:false});
window.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key.toLowerCase()==="p"){e.preventDefault();download();return}if(e.key==="1")setMode("ref");if(e.key==="2")setMode("1080");if(searchFocused){if(e.key==="Backspace"){searchText=searchText.slice(0,-1);e.preventDefault();draw()}else if(e.key==="Escape"||e.key==="Enter"){searchFocused=false;draw()}else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){searchText+=e.key;draw()}}});
function download(){let a=document.createElement("a");a.download=`TableDash_UI_v37_${page||"none"}_${new Date().toISOString().replace(/[:.]/g,"-")}.png`;a.href=canvas.toDataURL("image/png");a.click()}
setMode("ref");
</script>
