function txt(s,x,y,size=16,color=C.white,bold=true,align="center",base="middle",mw=null){
  s = String(s);
  let fs=size;
  ctx.textAlign=align;
  ctx.textBaseline=base;
  ctx.fillStyle=color;
  ctx.font=`${bold?900:700} ${fs}px Arial`;
  if(mw){
    while(ctx.measureText(s).width>mw && fs>7){
      fs-=1;
      ctx.font=`${bold?900:700} ${fs}px Arial`;
    }
    if(ctx.measureText(s).width>mw){
      let o=s;
      while(ctx.measureText(o).width>mw && o.length>2) o=o.slice(0,-2)+"…";
      s=o;
    }
  }
  ctx.fillText(s,x,y);
}

function claimTask(task){
  if(taskClaimed[task.id]) return;
  taskClaimed[task.id]=true;
  if(task.xp) grantXP(task.xp);
  toast(task.title+" claimed");
  draw();
}

function taskSortWeight(task){
  const ready = task.progress>=task.total && task.total>0;
  const claimed = !!taskClaimed[task.id];
  if(ready && !claimed) return 0;  // completed + unclaimed always first
  if(!ready && !claimed) return 1; // active progress second
  return 2;                        // claimed tasks drop to bottom
}

function rewardTaskRow(x,y,w,task){
  const title=task.title,progress=task.progress,total=task.total,xpReward=task.xp,kind=task.kind,extra=task.extra;
  const h=54;
  const ready=progress>=total && total>0;
  const claimed=!!taskClaimed[task.id];

  const stroke = claimed ? "#46345f" : ready ? C.gold2 : C.purple2;
  const top = claimed ? "#090b17" : "#101225";
  const bot = claimed ? "#05060d" : "#070916";
  grad(x,y,w,h,10,top,bot,stroke,claimed?1.0:ready?1.55:1.08,ready&&!claimed);

  ctx.save();
  if(claimed) ctx.globalAlpha=.68;

  drawIcon(kind,x+28,y+27,15,kind==="medal"?C.gold:C.muted);
  txt(title,x+58,y+17,12.2,claimed?C.muted:C.white,true,"left","middle",Math.max(120,w-224));

  const barW=Math.max(118,w-244);
  box(x+58,y+34,barW,8,5,"#170d27",claimed?"#3f315e":C.purple2,1);
  box(x+60,y+36,progress>0?barW*Math.min(1,progress/total):0,4,3,claimed?"#5e438b":ready?C.gold:C.violet,null,0);
  txt(`${progress} / ${total}`,x+58+barW+13,y+37,9.5,claimed?C.muted2:ready?C.gold:C.muted,true,"left","middle",52);

  // Raised so reward text does not crowd the progress fraction.
  txt(extra||`XP ${xpReward}`,x+w-145,y+21,9.2,claimed?C.muted2:ready?C.gold:C.muted,true,"left","middle",66);
  ctx.restore();

  if(claimed){
    disabledBtn(x+w-82,y+13,66,28,"CLAIMED",null,true);
    return;
  }

  const label=task.button || (ready?"CLAIM":"GO");
  const press=task.action || (()=>{ if(ready) claimTask(task); else rewardGoAction(kind,title)(); });
  btn(x+w-74,y+13,58,28,label,ready,press,null,true);
}

function rewardScrollableList(viewX,viewY,viewW,viewH,tasks){
  const rowH=54,gap=10;
  const sorted=[...tasks].sort((a,b)=>taskSortWeight(a)-taskSortWeight(b));
  const contentH=sorted.length*(rowH+gap)-gap;
  const maxScroll=Math.max(0,contentH-viewH);
  rewardsScroll=Math.max(0,Math.min(maxScroll,rewardsScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(viewX-2,viewY-2,viewW+4,viewH+4);
  ctx.clip();

  sorted.forEach((task,i)=>{
    const rowY=viewY+i*(rowH+gap)-rewardsScroll;
    if(rowY+rowH<viewY-2 || rowY>viewY+viewH+2)return;
    rewardTaskRow(viewX,rowY,viewW,task);
  });

  ctx.restore();

  if(maxScroll>0){
    const barX=viewX+viewW+12,barY=viewY+6,barH=viewH-12;
    box(barX,barY,4,barH,3,"#1b1130",null,0);
    const thumbH=Math.max(34,barH*(barH/contentH));
    const thumbY=barY+(barH-thumbH)*(rewardsScroll/maxScroll);
    box(barX-1,thumbY,6,thumbH,3,C.gold,null,0);
  }
}

function toySlotRow(x,y,w,title,value,status,locked=false,fn=null,actionLabel=null){
  const h=54;
  const lockedStroke = status==="PASS SLOT" ? "#6b4aa0" : "#4d3a72";
  const stroke = locked ? lockedStroke : C.purple2;
  const top = locked ? "#070914" : "#101225";
  const bot = locked ? "#05060d" : "#070916";
  grad(x,y,w,h,11,top,bot,stroke,locked?1.25:status==="EQUIPPED"?1.75:1.2,status==="EQUIPPED"&&!locked);

  if(locked){
    drawIcon("lock",x+18,y+27,12,(status==="PASS SLOT"||String(status).includes("PASS"))?C.gold:C.purple2);
    txt(title,x+42,y+16,12,C.muted,true,"left","middle",w-184);
    txt(value,x+42,y+35,8.5,C.muted2,false,"left","middle",w-184);
  }else{
    txt(title,x+16,y+17,12,C.white,true,"left","middle",w-166);
    txt(value,x+16,y+36,8.5,C.muted,false,"left","middle",w-166);
  }

  let label;
  if(locked) label = status==="PASS SLOT" ? "PASS LOCK" : status;
  else if(actionLabel) label = actionLabel;
  else if(status==="EQUIPPED") label = "CHANGE";
  else if(status==="EMPTY") label = "CHOOSE";
  else label = status;

  if(locked){
    disabledBtn(x+w-112,y+13,94,28,label,null,true);
  }else{
    const canPress = !!fn && (status==="EQUIPPED" || status==="EMPTY" || !!actionLabel || status==="INFO");
    btn(x+w-112,y+13,94,28,label,canPress && label!=="CHOOSE",fn,null,true);
    if(fn) hit("toy_slot_row_"+title,x,y,w-122,h,()=>{
      pressFx={x,y,w,h,until:performance.now()+180};
      draw();
      setTimeout(()=>{pressFx=null;fn()},80)
    });
  }
}
function toySlotValue(i){
  const toy=equippedToySlots[i];
  return toy ? "Equipped: "+toy : "Empty slot";
}
function toySlotStatus(i){
  return equippedToySlots[i] ? "EQUIPPED" : "EMPTY";
}
function selectToySlot(i){
  selectedToySlot=i;
  modal="toyBrowser";
  toyScroll=0;
  draw();
}

function selectBrowseToySlot(){
  // Browse Toys should open the first available empty slot.
  // If every usable slot is filled, default back to Slot 1.
  const usable=[];
  if(lvl>=2) usable.push(0);
  if(lvl>=5) usable.push(1);
  if(premiumOwned) usable.push(2);
  const empty=usable.find(i=>!equippedToySlots[i]);
  selectToySlot(empty!==undefined ? empty : 0);
}
function isToyEquippedElsewhere(name){
  return equippedToySlots.some((t,i)=>t===name && i!==selectedToySlot);
}
function syncEquippedToyLabel(){
  equippedToy = equippedToySlots.filter(Boolean).map(t=>t.split(" ")[0]).join("+") || "None";
}

function toyCard(x,y,w,h,toy){
  const owned=!!ownedToys[toy.name];
  const passLocked=(toy.kind==="passCoin"||toy.kind==="premiumTrack")&&!premiumOwned;
  const trackLocked=toy.kind==="freeTrack" && passLevel<3;
  const eventLocked=toy.kind==="event";
  const equippedIndex=equippedToySlots.findIndex(t=>t===toy.name);
  const equipped=equippedIndex===selectedToySlot;
  const equippedElsewhere=equippedIndex!==-1 && equippedIndex!==selectedToySlot;
  const locked=passLocked||trackLocked||eventLocked;
  const canBuy=toy.kind==="coin" && coins>=toy.cost;
  const canPassBuy=toy.kind==="passCoin" && premiumOwned && coins>=toy.cost;
  const canRobux=toy.kind==="robux";

  const stroke=equipped?C.gold2:equippedElsewhere?"#b98cff":locked?"#5e438b":(canBuy||canPassBuy||canRobux||owned)?C.gold2:C.purple2;
  grad(x,y,w,h,12,locked?"#090b17":"#101225","#070916",stroke,equipped?2.0:equippedElsewhere?1.55:1.2,equipped);
  box(x+12,y+14,52,48,10,locked?"#100b1c":"#17112b",locked?"#5e438b":C.purple2,1);
  drawIcon(toy.kind==="robux"?"star":toy.kind==="premiumTrack"?"medal":toy.kind==="event"?"flame":"gift",x+38,y+38,15,locked?C.purple2:C.gold);

  txt(toy.name,x+78,y+22,12,locked?C.muted:C.white,true,"left","middle",w-96);
  txt(toy.source,x+78,y+41,8.5,locked?C.muted2:C.muted,false,"left","middle",w-96);

  let tag=owned?"OWNED":toy.type.toUpperCase();
  if(toy.kind==="passCoin") tag="PURCHASE";
  if(equippedElsewhere) tag=`SLOT ${equippedIndex+1}`;
  smallStatus(x+78,y+54,116,tag,equipped?"ready":locked?"locked":equippedElsewhere?"muted":"muted");

  let label="EQUIP", disabled=false, active=false;
  if(equipped){label="EQUIPPED"; active=false}
  else if(equippedElsewhere){label="UNEQUIP"; active=false}
  else if(owned){label="EQUIP"; active=true}
  else if(toy.kind==="coin"){label=`${toy.cost.toLocaleString()} COINS`; active=coins>=toy.cost; disabled=!active}
  else if(toy.kind==="passCoin"){
    if(!premiumOwned){label="GET PASS"; active=true}
    else {label=`${toy.cost.toLocaleString()} COINS`; active=coins>=toy.cost; disabled=!active}
  }
  else if(toy.kind==="freeTrack"){label=passLevel>=3?"CLAIM":"PASS LVL 3"; active=passLevel>=3; disabled=!active}
  else if(toy.kind==="premiumTrack"){label=premiumOwned?"CLAIM":"GET PASS"; active=true}
  else if(toy.kind==="robux"){label=`R$ ${toy.cost}`; active=true}
  else if(toy.kind==="event"){label="EVENT"; disabled=true}

  const bx=x+w-124, by=y+h-40;
  if(disabled){
    disabledBtn(bx,by,108,26,label,null,true);
  }else{
    btn(bx,by,108,26,label,active,()=>{
      if(equipped){
        equippedToySlots[selectedToySlot]=null;
        syncEquippedToyLabel();
        toast("Toy unequipped from Slot "+(selectedToySlot+1));
        draw();
        return;
      }
      if(equippedElsewhere){
        equippedToySlots[equippedIndex]=null;
        syncEquippedToyLabel();
        toast("Toy unequipped from Slot "+(equippedIndex+1));
        draw();
        return;
      }
      if(owned){
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Toy equipped to Slot "+(selectedToySlot+1));
        draw();
        return;
      }
      if(toy.kind==="coin" && coins>=toy.cost){
        coins-=toy.cost;
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Toy bought and equipped");
        draw();
        return;
      }
      if(toy.kind==="passCoin"){
        if(!premiumOwned){modal="passBuy";draw();return}
        if(coins>=toy.cost){
          coins-=toy.cost;
          ownedToys[toy.name]=true;
          equippedToySlots[selectedToySlot]=toy.name;
          syncEquippedToyLabel();
          toast("Purchase equipped");
          draw();
          return;
        }
      }
      if(toy.kind==="premiumTrack"){
        if(!premiumOwned){modal="passBuy";draw();return}
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Premium reward equipped");
        draw();
        return;
      }
      if(toy.kind==="freeTrack" && passLevel>=3){
        ownedToys[toy.name]=true;
        equippedToySlots[selectedToySlot]=toy.name;
        syncEquippedToyLabel();
        toast("Free-track toy claimed");
        draw();
        return;
      }
      if(toy.kind==="robux"){toast("Robux purchase placeholder");return}
    },null,true);
  }
}


function customSlotMeta(id){return customSlots.find(s=>s.id===id)||customSlots[0]}
function customSlotValue(id){
  const slot=customSlotMeta(id);
  if(!equippedStyles[id]){
    if(id==="skin") equippedStyles[id]="Default";
    else if(id==="chairs") equippedStyles[id]="Default Chairs";
    else if(id==="sign") equippedStyles[id]="Default Sign";
    else equippedStyles[id]="None";
  }
  return equippedStyles[id];
}
function customSlotLocked(id){
  const slot=customSlotMeta(id);
  if(slot.passLocked) return !premiumOwned;
  return lvl < slot.slotLevel;
}
function customSlotLockText(id){
  const slot=customSlotMeta(id);
  if(slot.passLocked) return "GET PASS";
  return `LVL ${slot.slotLevel}`;
}
function selectCustomSlot(id){
  if(customSlotLocked(id)){
    const slot=customSlotMeta(id);
    if(slot.passLocked){modal="passBuy";draw();return}
    toast(`${slot.title} unlocks at Level ${slot.slotLevel}`);
    return;
  }
  selectedCustomSlot=id;
  styleScroll=0;
  modal="styleCabinet";
  draw();
}
function syncStylePills(){
  tableTheme=customSlotValue("skin");
  equippedPet=customSlotValue("pet");
}

function openTableNameEditor(){
  const existing=document.getElementById("tableNameEditor");
  if(existing) existing.remove();

  const overlay=document.createElement("div");
  overlay.id="tableNameEditor";
  overlay.style.cssText=[
    "position:fixed",
    "left:50%",
    "top:50%",
    "transform:translate(-50%,-50%)",
    "z-index:9999",
    "width:min(420px,calc(100vw - 34px))",
    "box-sizing:border-box",
    "padding:18px",
    "border:2px solid rgb(170,72,255)",
    "border-radius:18px",
    "background:linear-gradient(#11142a,#070916)",
    "box-shadow:0 0 26px rgba(170,72,255,.72)",
    "color:#f5f0ff",
    "font-family:Arial,Helvetica,sans-serif"
  ].join(";");

  overlay.innerHTML = `
    <div style="font-weight:900;font-size:22px;letter-spacing:.2px;margin-bottom:5px;">Edit Table Name</div>
    <div style="font-weight:800;color:#ffe169;font-size:14px;margin-bottom:12px;">18 characters max</div>
    <input id="tableNameInput" maxlength="18" value="${tableName.replace(/"/g,"&quot;")}" style="
      width:100%;box-sizing:border-box;height:44px;border-radius:12px;border:1.5px solid #6946af;
      background:#080a16;color:#f5f0ff;font-weight:900;font-size:18px;padding:0 13px;outline:none;
      box-shadow:inset 0 0 0 1px rgba(170,72,255,.18);
    " />
    <div style="display:flex;gap:12px;margin-top:14px;">
      <button id="tableNameSave" style="
        flex:1;height:40px;border-radius:12px;border:2px solid rgb(255,204,76);background:#1b1224;
        color:#ffe169;font-weight:900;cursor:pointer;box-shadow:0 0 14px rgba(255,204,76,.28);
      ">SAVE</button>
      <button id="tableNameCancel" style="
        flex:1;height:40px;border-radius:12px;border:1.5px solid #6946af;background:#0d1022;
        color:#c7b8f0;font-weight:900;cursor:pointer;
      ">CANCEL</button>
    </div>
  `;
  document.body.appendChild(overlay);

  const input=document.getElementById("tableNameInput");
  const save=document.getElementById("tableNameSave");
  const cancel=document.getElementById("tableNameCancel");

  const commit=()=>{
    const cleaned=String(input.value||"").replace(/\s+/g," ").trim().slice(0,18);
    tableName=cleaned||"MY TABLE";
    overlay.remove();
    toast("Table name updated");
    draw();
  };
  save.onclick=commit;
  cancel.onclick=()=>overlay.remove();
  input.onkeydown=(e)=>{if(e.key==="Enter")commit();if(e.key==="Escape")overlay.remove();};
  setTimeout(()=>{input.focus();input.select();},60);
}

function drawCustomStackRows(x,y,w,h){
  // Row area uses the same row sizing as Toy Slots. Scrollbar moved to the far right,
  // outside the button lane, so it does not sit on top of CHANGE buttons.
  const rowH=54, gap=6;
  const contentH=customSlots.length*(rowH+gap)-gap;
  const maxScroll=Math.max(0,contentH-h);
  customScroll=Math.max(0,Math.min(maxScroll,customScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(x-2,y-2,w+4,h+4);
  ctx.clip();

  customSlots.forEach((slot,i)=>{
    const ry=y+i*(rowH+gap)-customScroll;
    if(ry+rowH<y-2 || ry>y+h+2)return;
    customRow(x,ry,w,slot);
  });
  ctx.restore();

  if(maxScroll>0){
    const barX=x+w+12,barY=y+6,barH=h-12;
    box(barX,barY,4,barH,3,"#1b1130",null,0);
    const thumbH=Math.max(34,barH*(barH/contentH));
    const thumbY=barY+(barH-thumbH)*(customScroll/maxScroll);
    box(barX-1,thumbY,6,thumbH,3,C.gold,null,0);
  }
}

function styleCard(x,y,w,h,item){
  const owned=!!ownedStyles[item.name];
  const passLocked=(item.kind==="passCoin"||item.kind==="premiumTrack")&&!premiumOwned;
  const trackLocked=item.kind==="freeTrack" && passLevel<(item.level||3);
  const locked=passLocked||trackLocked;
  const equipped=customSlotValue(selectedCustomSlot)===item.name;
  const canBuy=item.kind==="coin" && (item.cost===0 || coins>=item.cost);
  const canPassBuy=item.kind==="passCoin" && premiumOwned && coins>=item.cost;
  const canRobux=item.kind==="robux";
  const stroke=equipped?C.gold2:locked?"#5e438b":C.purple2;

  grad(x,y,w,h,12,locked?"#090b17":"#101225","#070916",stroke,equipped?1.8:1.15,equipped);
  box(x+12,y+14,52,48,10,locked?"#100b1c":"#17112b",locked?"#5e438b":C.purple2,1);
  drawIcon(selectedCustomSlot==="pet"?"gift":selectedCustomSlot==="intro"?"star":selectedCustomSlot==="fx"?"flame":selectedCustomSlot==="badge"?"medal":selectedCustomSlot==="chairs"?"table":"table",x+38,y+38,15,locked?C.purple2:C.gold);

  txt(item.name,x+78,y+22,12,locked?C.muted:C.white,true,"left","middle",w-96);
  txt(item.source,x+78,y+41,8.5,locked?C.muted2:C.muted,false,"left","middle",w-96);

  let tag=owned?"OWNED":item.kind==="passCoin"?"PURCHASE":item.kind.toUpperCase();
  if(item.kind==="freeTrack")tag=`FREE LVL ${item.level||3}`;
  if(item.cost===0 && item.kind==="coin") tag="MILESTONE";
  smallStatus(x+78,y+54,116,tag,equipped?"ready":locked?"locked":"muted");

  let label="EQUIP", disabled=false, active=false;
  if(equipped){label="EQUIPPED"; disabled=true}
  else if(owned){label="EQUIP"; active=true}
  else if(item.kind==="coin"){
    if(item.cost===0){label="CLAIM"; active=true}
    else {label=`${item.cost.toLocaleString()} COINS`; active=coins>=item.cost; disabled=!active}
  }
  else if(item.kind==="passCoin"){
    if(!premiumOwned){label="GET PASS"; active=true}
    else {label=`${item.cost.toLocaleString()} COINS`; active=coins>=item.cost; disabled=!active}
  }
  else if(item.kind==="premiumTrack"){label=premiumOwned?"CLAIM":"GET PASS"; active=true}
  else if(item.kind==="freeTrack"){label=passLevel>=(item.level||3)?"CLAIM":`PASS LVL ${item.level||3}`; active=passLevel>=(item.level||3); disabled=!active}
  else if(item.kind==="robux"){label=`R$ ${item.cost}`; active=true}

  const bx=x+w-124, by=y+h-40;
  if(disabled) disabledBtn(bx,by,108,26,label,null,true);
  else btn(bx,by,108,26,label,active,()=>{
    if(owned){
      equippedStyles[selectedCustomSlot]=item.name;
      syncStylePills();
      toast(`${customSlotMeta(selectedCustomSlot).title} equipped`);
      draw();
      return;
    }
    if(item.kind==="coin"){
      if(item.cost===0 || coins>=item.cost){
        if(item.cost>0) coins-=item.cost;
        ownedStyles[item.name]=true;
        equippedStyles[selectedCustomSlot]=item.name;
        syncStylePills();
        toast("Style equipped");
        draw();
      }
      return;
    }
    if(item.kind==="passCoin"){
      if(!premiumOwned){modal="passBuy";draw();return}
      if(coins>=item.cost){coins-=item.cost; ownedStyles[item.name]=true; equippedStyles[selectedCustomSlot]=item.name; syncStylePills();toast("Pass purchase equipped");draw();return}
    }
    if(item.kind==="premiumTrack"){
      if(!premiumOwned){modal="passBuy";draw();return}
      ownedStyles[item.name]=true; equippedStyles[selectedCustomSlot]=item.name; syncStylePills();toast("Pass item equipped");draw();return;
    }
    if(item.kind==="freeTrack" && passLevel>=(item.level||3)){
      ownedStyles[item.name]=true; equippedStyles[selectedCustomSlot]=item.name; syncStylePills();toast("Free-track style equipped");draw();return;
    }
    if(item.kind==="robux"){toast("Robux purchase placeholder");return}
  },null,true);
}

  if(u.level===10) return ()=>{modal=null;page="mytable";draw();setTimeout(editTableName,80)};
  if(u.level===12) return ()=>{modal=null;page="mytable";myTableTab="custom";customScroll=240;draw()};
  if(u.level===16) return ()=>{modal=null;page="mytable";myTableTab="custom";customScroll=300;draw()};

  box(x,y,w,h,12,"#090b17",C.purple2,1);
  const rowH=52,gap=8,inner=12;
  const contentH=LEVEL_UNLOCKS.length*(rowH+gap)-gap+inner*2;
  const maxScroll=Math.max(0,contentH-h);
  levelScroll=Math.max(0,Math.min(maxScroll,levelScroll));

  ctx.save();
  ctx.beginPath();
  ctx.rect(x+8,y+8,w-16,h-16);
  ctx.clip();

  LEVEL_UNLOCKS.forEach((u,i)=>{
    const ry=y+inner+i*(rowH+gap)-levelScroll;
    if(ry+rowH<y+8 || ry>y+h-8)return;
    const unlocked=lvl>=u.level;

    // Intentional: level unlock rows never use the yellow glow/border.
    box(x+18,ry,w-36,rowH,10,unlocked?"#101225":"#080a15",C.purple2,1.05);

    txt("LVL "+u.level,x+38,ry+17,12,unlocked?C.gold:C.muted,true,"left","middle",66);
    txt(u.title,x+105,ry+17,12,unlocked?C.white:C.muted,true,"left","middle",210);
    txt(u.body,x+105,ry+36,8.5,C.muted2,false,"left","middle",320);

    if(unlocked){
      btn(x+w-128,ry+13,86,26,"OPEN",true,levelUnlockTarget(u),null,true);
    }else{
      disabledBtn(x+w-128,ry+13,86,26,"LOCKED",null,true);
    }
  });

  ctx.restore();

  if(maxScroll>0){
    const barX=x+w-12,barY=y+12,barH=h-24;
    box(barX,barY,4,barH,3,"#1b1130",null,0);
    const thumbH=Math.max(34,barH*(barH/contentH));
    const thumbY=barY+(barH-thumbH)*(levelScroll/maxScroll);
    box(barX-1,thumbY,6,thumbH,3,C.gold,null,0);
  }
}

function drawStyleCabinetPopup(){
  const slot=customSlotMeta(selectedCustomSlot);
  const m=modalShell(640,500,"STYLE CABINET",`Choose ${slot.title}`,"table");
  txt("Pick an earned, purchased, or default option for this loadout slot.",m.x+34,m.y+100,10.5,C.muted,false,"left","middle",560);

  const viewX=m.x+34, viewY=m.y+126, viewW=572, viewH=292;
  box(viewX,viewY,viewW,viewH,12,"#090b17",C.purple2,1);

  ctx.save();
  ctx.beginPath();
  ctx.rect(viewX+8,viewY+8,viewW-16,viewH-16);
  ctx.clip();

  const items=styleCatalog[selectedCustomSlot]||[];
  const cardW=532, cardH=86, gapY=14;
  const contentH=items.length*(cardH+gapY)-gapY+16;
  const maxScroll=Math.max(0,contentH-(viewH-16));
  styleScroll=Math.max(0,Math.min(maxScroll,styleScroll));

  items.forEach((item,i)=>{
    const x=viewX+18;
    const y=viewY+16+i*(cardH+gapY)-styleScroll;
    if(y+cardH<viewY+8 || y>viewY+viewH-8)return;
    styleCard(x,y,cardW,cardH,item);
  });
  ctx.restore();

  if(maxScroll>0){
    const barX=viewX+viewW-12,barY=viewY+14,barH=viewH-28;
    box(barX,barY,4,barH,3,"#1b1130",null,0);
    const thumbH=Math.max(34,barH*(barH/(contentH+18)));
    const thumbY=barY+(barH-thumbH)*(styleScroll/maxScroll);
    box(barX-1,thumbY,6,thumbH,3,C.gold,null,0);
  }

  btn(m.x+34,m.y+434,150,34,"LOADOUT",false,()=>{modal=null;myTableTab="custom";draw()},null,true);
  btn(m.x+204,m.y+434,150,34,"CLOSE",false,()=>{modal=null;draw()},null,true);
}

function drawModal(){if(!modal)return;if(modal==="join"){drawJoinModal();return}if(modal==="results"){drawResults();return}if(modal==="hostGame"){drawHostSettingsPopup();return}drawSimpleModal()}
function drawToast(){if(!toastText||performance.now()>toastUntil)return;grad(455,585,340,34,9,"#0d1022","#070916",C.purple2,1.3,true);txt(toastText,625,602,12,C.white,true);requestAnimationFrame(draw)}
function toast(s){toastText=s;toastUntil=performance.now()+1800;draw()}
function draw(){hitboxes=[];ref(()=>{background();topBar();if(page==="play")drawPlay();else if(page==="rewards")drawRewards();else if(page==="pass")drawPass();else if(page==="mytable")drawMyTable();else txt("No page open",625,310,28,C.muted,true);bottomNav();drawModal();drawToast()})}
canvas.addEventListener("mousedown",e=>{let p=toRef(e.clientX,e.clientY);for(let i=hitboxes.length-1;i>=0;i--){let h=hitboxes[i];if(p.x>=h.x&&p.x<=h.x+h.w&&p.y>=h.y&&p.y<=h.y+h.h){h.fn();return}}if(searchFocused){searchFocused=false;draw()}});
canvas.addEventListener("wheel",e=>{
  if(modal==="toyBrowser"){
    e.preventDefault();
    toyScroll=Math.max(0,toyScroll+e.deltaY);
    draw();
    return;
  }
  if(modal==="level"){
    e.preventDefault();
    levelScroll=Math.max(0,levelScroll+e.deltaY);
    draw();
    return;
  }
  if(modal==="styleCabinet" || modal==="customize"){
    e.preventDefault();
    styleScroll=Math.max(0,styleScroll+e.deltaY);
    draw();
    return;
  }
  if(page==="rewards" && !modal){
    e.preventDefault();
    rewardsScroll=Math.max(0,rewardsScroll+e.deltaY);
    draw();
    return;
  }
  if(page==="mytable" && myTableTab==="custom" && !modal){
    e.preventDefault();
    customScroll=Math.max(0,customScroll+e.deltaY);
    draw();
  }
},{passive:false});
window.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key.toLowerCase()==="p"){e.preventDefault();download();return}if(e.key==="1")setMode("ref");if(e.key==="2")setMode("1080");if(searchFocused){if(e.key==="Backspace"){searchText=searchText.slice(0,-1);e.preventDefault();draw()}else if(e.key==="Escape"||e.key==="Enter"){searchFocused=false;draw()}else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){searchText+=e.key;draw()}}});
function download(){let a=document.createElement("a");a.download=`TableDash_UI_v62_${page||"none"}_${new Date().toISOString().replace(/[:.]/g,"-")}.png`;a.href=canvas.toDataURL("image/png");a.click()}
setMode("ref");
